<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Stylized portrait of Marvin Aguilar">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#232a3d"/>
      <stop offset="52%" stop-color="#111627"/>
      <stop offset="100%" stop-color="#070912"/>
    </radialGradient>
    <linearGradient id="skin" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#e7b48d"/>
      <stop offset="50%" stop-color="#d0966e"/>
      <stop offset="100%" stop-color="#ac7150"/>
    </linearGradient>
    <linearGradient id="skinShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a6244"/>
      <stop offset="100%" stop-color="#c0805d"/>
    </linearGradient>
    <linearGradient id="hair" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#37302b"/>
      <stop offset="60%" stop-color="#1c1815"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="beard" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#241f1b"/>
      <stop offset="100%" stop-color="#100d0b"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6a2c39"/>
      <stop offset="100%" stop-color="#3a1620"/>
    </linearGradient>
    <linearGradient id="gilt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a24a"/>
      <stop offset="50%" stop-color="#f6e2a8"/>
      <stop offset="100%" stop-color="#c9a24a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
    <clipPath id="round"><circle cx="256" cy="256" r="252"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <circle cx="256" cy="196" r="176" fill="#e9c46a" opacity="0.07"/>
    <circle cx="256" cy="196" r="120" fill="#c97b8e" opacity="0.05"/>

    <!-- shoulders / burgundy shirt -->
    <path d="M78 512 C92 398 162 352 256 352 C350 352 420 398 434 512 Z" fill="url(#shirt)"/>
    <path d="M256 352 C232 372 220 398 218 512 L294 512 C292 398 280 372 256 352 Z" fill="#4d1e29" opacity="0.55"/>
    <path d="M256 352 C246 366 240 380 238 402 C250 388 262 388 274 402 C272 380 266 366 256 352 Z" fill="#e7b48d" opacity="0.35"/>

    <!-- neck -->
    <path d="M222 312 C222 356 230 368 256 372 C282 368 290 356 290 312 Z" fill="url(#skinShade)"/>

    <g filter="url(#soft)">
      <!-- back hair (behind face, gives fullness) -->
      <path d="M150 232 C138 150 190 86 256 86 C322 86 374 150 362 232 C362 250 356 268 350 282 C356 224 340 150 256 150 C172 150 156 224 162 282 C156 268 150 250 150 232 Z" fill="url(#hair)"/>

      <!-- ears -->
      <ellipse cx="168" cy="242" rx="15" ry="24" fill="url(#skin)"/>
      <ellipse cx="344" cy="242" rx="15" ry="24" fill="url(#skin)"/>
      <ellipse cx="168" cy="244" rx="7" ry="13" fill="#a26947" opacity="0.6"/>
      <ellipse cx="344" cy="244" rx="7" ry="13" fill="#a26947" opacity="0.6"/>

      <!-- face -->
      <path d="M256 120
               C322 120 346 172 346 230
               C346 300 310 344 256 344
               C202 344 166 300 166 230
               C166 172 190 120 256 120 Z" fill="url(#skin)"/>
      <!-- cheek / jaw shading -->
      <path d="M178 244 C184 300 214 336 256 342 C232 330 214 300 208 250 Z" fill="#9c6446" opacity="0.4"/>
      <path d="M334 244 C328 300 298 336 256 342 C280 330 298 300 304 250 Z" fill="#9c6446" opacity="0.28"/>
    </g>

    <!-- top hair (full crown, swept) -->
    <path d="M158 236
             C146 152 196 92 256 92
             C316 92 366 152 354 236
             C350 208 342 190 336 192
             C340 172 330 156 320 160
             C312 138 286 126 256 128
             C226 126 200 138 192 160
             C182 156 172 172 176 192
             C170 190 162 208 158 236 Z" fill="url(#hair)"/>
    <path d="M200 158 C226 138 286 138 312 158 C286 148 226 148 200 158 Z" fill="#4a423b" opacity="0.5"/>
    <path d="M256 128 C238 130 214 140 202 160 C224 150 232 168 256 166 C280 168 288 150 310 160 C298 140 274 130 256 128 Z" fill="#2c2621" opacity="0.7"/>

    <!-- eyebrows -->
    <path d="M198 216 C214 207 238 207 250 213" stroke="#201914" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M262 213 C274 207 298 207 314 216" stroke="#201914" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- eyes -->
    <ellipse cx="220" cy="236" rx="14" ry="8.5" fill="#f5f0e7"/>
    <ellipse cx="292" cy="236" rx="14" ry="8.5" fill="#f5f0e7"/>
    <circle cx="221" cy="236" r="5.6" fill="#4a3524"/>
    <circle cx="293" cy="236" r="5.6" fill="#4a3524"/>
    <circle cx="221" cy="236" r="2.6" fill="#191310"/>
    <circle cx="293" cy="236" r="2.6" fill="#191310"/>
    <circle cx="223.4" cy="233.6" r="1.7" fill="#fff"/>
    <circle cx="295.4" cy="233.6" r="1.7" fill="#fff"/>

    <!-- nose -->
    <path d="M256 240 C252 262 245 274 242 280 C247 287 265 287 270 280 C267 274 260 262 256 240 Z" fill="#b3785a" opacity="0.55"/>
    <path d="M244 280 C249 285 263 285 268 280" stroke="#8f5b41" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- glasses (black rectangular frames) -->
    <g fill="none" stroke="#0e1114" stroke-width="7" stroke-linejoin="round">
      <rect x="192" y="216" width="56" height="40" rx="11"/>
      <rect x="264" y="216" width="56" height="40" rx="11"/>
      <path d="M248 232 C254 227 258 227 264 232"/>
      <path d="M192 227 L172 224"/>
      <path d="M320 227 L340 224"/>
    </g>
    <rect x="195" y="219" width="50" height="34" rx="9" fill="#9cc3d4" opacity="0.12"/>
    <rect x="267" y="219" width="50" height="34" rx="9" fill="#9cc3d4" opacity="0.12"/>

    <!-- mustache -->
    <path d="M226 288 C240 297 272 297 286 288 C282 302 268 308 256 308 C244 308 230 302 226 288 Z" fill="url(#beard)"/>
    <!-- beard -->
    <path d="M196 258
             C194 302 214 340 256 346
             C298 340 318 302 316 258
             C316 284 302 306 282 314
             C287 302 287 293 285 288
             C272 300 240 300 227 288
             C225 293 225 302 230 314
             C210 306 196 284 196 258 Z" fill="url(#beard)"/>
    <path d="M256 320 C244 320 234 316 228 308 C240 316 272 316 284 308 C278 316 268 320 256 320 Z" fill="#0c0908"/>
    <path d="M210 272 C213 258 221 249 232 245 C221 253 217 265 217 278 Z" fill="#33291f" opacity="0.5"/>
  </g>

  <!-- gilded expedition rings -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#gilt)" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gilt)" stroke-width="1" opacity="0.35" stroke-dasharray="2 9"/>
</svg>
